<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>☕ Café Finder</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="app-wrapper">

    <header class="header">
      <div class="header-left">
        <span class="header-icon">☕</span>
        <div>
          <h1>Café Finder</h1>
          <p>Discover cozy spots near you</p>
        </div>
      </div>
      <button id="locate-btn" class="locate-btn">📍 Use my location</button>
    </header>

    <div class="search-bar">
      <input id="search-input" type="text" placeholder="Search a city or neighborhood..." />
      <button id="search-btn">Search</button>
    </div>

    <div class="filters">
      <button class="chip active" data-filter="all">All</button>
      <button class="chip" data-filter="open">Open Now</button>
      <button class="chip" data-filter="wifi">Wi-Fi</button>
      <button class="chip" data-filter="pet">Pet Friendly</button>
      <button class="chip" data-filter="outdoor">Outdoor</button>
      <button class="chip" data-filter="top">Top Rated ★</button>
    </div>

    <div class="main-layout">
      <aside class="sidebar">
        <div class="sidebar-msg" id="sidebar-msg">
          <span>🗺️</span>
          <p>Search or allow location to find cafes near you!</p>
        </div>
        <div id="cafe-list"></div>
      </aside>

      <!-- Detail panel (shown when a cafe is selected) -->
      <div id="detail-panel" class="detail-panel hidden">
        <button id="close-detail">✕</button>
        <div id="detail-content"></div>
      </div>

      <div id="map"></div>
    </div>

    <div class="status-bar">
      <span id="status-text">Ready to find cafes ☕</span>
      <span class="powered">Powered by Google Maps Platform</span>
    </div>

  </div>

  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBjVGI1q3yvJ6PcEJFhN4yv3RR34fS34DM&libraries=places&callback=initMap" async defer></script>
  <script src="cafe.js"></script>
</body>
</html>
