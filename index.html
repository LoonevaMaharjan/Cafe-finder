<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cafe Finder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="app-wrapper">

    <header class="header">
      <div class="header-left">
        <div class="header-icon">☕</div>
        <div>
          <h1>Cafe Finder</h1>
          <p>Discover cozy spots near you</p>
        </div>
      </div>
      <button id="locate-btn" class="locate-btn">My Location</button>
    </header>

    <div class="search-bar">
      <div class="search-input-wrap">
        <span class="search-icon">⌕</span>
        <input id="search-input" type="text" placeholder="Search any city, area or neighborhood..." />
      </div>
      <button id="search-btn">Search</button>
    </div>

    <div class="filters" id="filters">
      <button class="chip active" data-filter="all">All</button>
      <button class="chip" data-filter="open">Open Now</button>
      <button class="chip" data-filter="top">Top Rated</button>
      <button class="chip" data-filter="wifi">Wi-Fi</button>
      <button class="chip" data-filter="pet">Pet Friendly</button>
      <button class="chip" data-filter="outdoor">Outdoor</button>
      <button class="chip" data-filter="cheap">Budget</button>
    </div>

    <div class="main-layout">
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-msg" id="sidebar-msg">
          <div class="msg-icon">☕</div>
          <p class="msg-title">Find your next café</p>
          <p class="msg-sub">Search a location or tap "My Location" to discover cafes nearby</p>
        </div>
        <div id="cafe-list"></div>
      </aside>

      <div class="map-container">
        <div id="map"></div>
        <button id="search-area-btn" class="search-area-btn hidden">
          Search this area
        </button>
      </div>

      <div id="detail-panel" class="detail-panel hidden">
        <button id="close-detail" class="close-btn">✕</button>
        <div id="detail-content"></div>
      </div>
    </div>

    <div class="status-bar">
      <span id="status-text">Ready to find cafes</span>
      <span class="powered">Powered by Google Maps Platform</span>
    </div>

  </div>

  <script src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&libraries=places,geometry&callback=initMap" async defer></script>
  <script src="cafe.js"></script>
</body>
</html>
